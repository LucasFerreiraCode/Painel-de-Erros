<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Painel de Erros - Meta WhatsApp API</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="header-inner">
            <div class="header-brand">
                <img src="img/yup.chat.svg" alt="Logo Yup Chat" class="brand-icon">
                <div>
                    <h1 class="brand-title">Painel de Erros</h1>
                    <p class="brand-subtitle"><span id="apiType">Meta WhatsApp API</span> · Diagnóstico inteligente</p>
                </div>
            </div>
            <div class="channel-tabs">
                <button id="whatsappBtn" class="channel-btn active">WhatsApp</button>
                <button id="smsBtn" class="channel-btn">SMS</button>
                <button id="rcsBtn" class="channel-btn">RCS</button>
            </div>
        </div>
    </header>
    <main class="main">
        <div class="filters">
            <div class="search-wrapper">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                </svg>
                <input type="text" id="searchInput" placeholder="Buscar por código ou descrição..."
                    class="search-input">
            </div>
        </div>
        <div class="panel">
            <div class="error-list-card">
                <h2 class="list-title">Falhas (<span id="errorCount">0</span>)</h2>
                <ul class="error-list" id="errorList"></ul>
                <div class="meta-help" id="metaHelp" style="display: none;">
                    <div class="meta-help-content">
                        <p class="meta-help-text">Não encontrou o código que procura?</p>
                        <a href="https://developers.facebook.com/documentation/business-messaging/whatsapp/support/error-codes" target="_blank" class="meta-help-link">Consulte a documentação oficial da Meta</a>
                    </div>
                </div>
            </div>
            <div class="error-details-card" id="errorDetails">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                        style="opacity:0.3">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                    <p class="empty-title">Selecione um erro para ver os detalhes</p>
                    <p class="empty-sub">Clique em qualquer item da lista</p>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
